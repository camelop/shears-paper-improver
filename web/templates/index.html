<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shears - Paper Review</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <div class="header-left">
      <h1>Shears</h1>
      <span class="subtitle">Paper Quality Review</span>
    </div>
    <div class="header-right">
      <span id="status-badge" class="badge badge-running">Checking...</span>
    </div>
  </header>

  <section id="progress-panel">
    <div id="progress-bars"></div>
  </section>

  <section id="controls">
    <div class="controls-left">
      <div class="btn-group">
        <button class="btn btn-sm active" data-group="criteria" onclick="setGroupMode('criteria')">By Criteria</button>
        <button class="btn btn-sm" data-group="page" onclick="setGroupMode('page')">By Page</button>
      </div>
      <div class="btn-group">
        <button class="btn btn-sm" onclick="selectAll()">Select All</button>
        <button class="btn btn-sm" onclick="deselectAll()">Deselect All</button>
      </div>
    </div>
    <div class="controls-right">
      <span id="selection-count">0 / 0 selected</span>
    </div>
  </section>

  <main>
    <div id="problems-panel">
      <div id="problems-container">
        <div class="empty-state">Waiting for checker agents to start...</div>
      </div>
    </div>
    <div id="pdf-panel">
      <div id="pdf-toolbar">
        <button class="btn btn-sm" onclick="pdfPrevPage()" title="Previous page">&larr;</button>
        <span id="pdf-page-info">Page - / -</span>
        <button class="btn btn-sm" onclick="pdfNextPage()" title="Next page">&rarr;</button>
        <span class="toolbar-sep"></span>
        <button class="btn btn-sm" onclick="pdfZoomOut()" title="Zoom out (Ctrl/Cmd -)">&minus;</button>
        <span id="pdf-zoom-info">100%</span>
        <button class="btn btn-sm" onclick="pdfZoomIn()" title="Zoom in (Ctrl/Cmd +)">&plus;</button>
        <button class="btn btn-sm" onclick="pdfZoomFit()" title="Fit to width">Fit</button>
        <button class="btn btn-sm" onclick="pdfZoomReset()" title="Reset to 100%">1:1</button>
        <span class="toolbar-sep"></span>
        <button class="btn btn-sm" onclick="clearHighlights()" title="Clear highlights">Clear</button>
      </div>
      <div id="pdf-viewport">
        <div id="pdf-page-container">
          <canvas id="pdf-canvas"></canvas>
          <div id="text-layer" class="textLayer"></div>
          <div id="highlight-layer"></div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
